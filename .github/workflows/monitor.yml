name: Webpage Monitor

on:
  schedule:
    # 每天北京时间 9:00 (UTC+8) → UTC 1:00
    - cron: "0 1 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright requests

      - name: Install Chromium for Playwright
        run: |
          python -m playwright install chromium --with-deps

      - name: Run monitor
        env:
          FEISHU_WEBHOOKS: ${{ secrets.FEISHU_WEBHOOKS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_URL: ${{ vars.TARGET_URL || 'https://bestbellachen.github.io/robot-test-private/' }}
        run: python monitor.py

      - name: Commit updated record
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_record.txt
          git diff --staged --quiet || git commit -m "[bot] update last_record.txt"
          git push
